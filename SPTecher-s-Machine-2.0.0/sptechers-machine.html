<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPTecher's Machine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 style="color:white">Binary Machine</h1>

        <p><input id="demo1" type="text" placeholder="Ex: 42"></p>

        <button onclick="converter()">Converter</button>
        <p>Octal:1
        <div id="demo2"></div>
        </p>
        <p>Hexadecimal:
        <div id="demo3"></div>
        </p>
        <p>Binário:
        <div id="demo4"></div>
        </p>
    </div>
    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = `<p style="color: white;">${decimal.toString(8)}</p>`;
            demo3.innerHTML = `<p style="color: white;">${decimal.toString(16)}</p>`;
            demo4.innerHTML = `<p style="color: white;">${decimal.toString(2)}</p>`;
        }
    </script>
</body>

</html>
